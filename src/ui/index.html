<!DOCTYPE html>

<html color-scheme="light dark" lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agentcfg Dashboard</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='url(%23g)'/><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23fbbf24'/><stop offset='100%25' stop-color='%23d97706'/></linearGradient></defs><text x='16' y='22' text-anchor='middle' fill='white' font-family='monospace' font-weight='700' font-size='16'>Ac</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="theme.css">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html{font-size:16px;-webkit-font-smoothing:antialiased}

body{font-family:'Fira Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;line-height:1.6;transition:background .3s,color .3s}

::-webkit-scrollbar{width:6px}

::-webkit-scrollbar-track{background:var(--scrollbar-bg)}

::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}

.app-container{max-width:1280px;margin:0 auto;padding:24px 32px 64px}



.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 24px;border-bottom:1px solid var(--border-color);margin-bottom:32px;transition:border-color .3s}

.header-left{display:flex;align-items:center;gap:16px}

.logo-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fira Code',monospace;font-weight:700;font-size:14px;color:#fff;box-shadow:0 0 14px var(--primary-glow)}

[data-theme="light"] .logo-icon{background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 50%,#d97706 100%)}

[data-theme="dark"] .logo-icon{background:linear-gradient(135deg,#fcd34d 0%,#f59e0b 50%,#d97706 100%)}

.header h1{font-family:'Fira Code',monospace;font-size:20px;font-weight:600;letter-spacing:-.3px}

.header h1 span{color:var(--primary)}



.theme-toggle,.lang-toggle{display:flex;align-items:center;gap:4px;background:var(--nav-bg);border:1px solid var(--border-color);border-radius:24px;padding:3px;cursor:pointer;transition:border-color .3s}

.theme-toggle:hover,.lang-toggle:hover{border-color:var(--border-light)}

.toggle-opt{display:flex;align-items:center;justify-content:center;min-height:36px;min-width:36px;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text-muted);transition:color .25s,background .25s,box-shadow .25s;user-select:none;line-height:1.4}

.toggle-opt.active{background:var(--primary);color:#fff;box-shadow:0 0 10px var(--primary-glow)}

.toggle-opt:focus-visible,.nav-pill:focus-visible,.date-filter:focus-visible{outline:2px solid var(--primary);outline-offset:2px}



.nav-pills{display:flex;gap:4px;background:var(--nav-bg);padding:4px;border-radius:8px;border:1px solid var(--border-color)}

.nav-pill{padding:8px 20px;border:none;background:transparent;color:var(--text-secondary);font-family:'Fira Sans',sans-serif;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;transition:color .2s,background .2s}

.nav-pill:hover{color:var(--text-primary)}

.nav-pill.active{background:var(--primary);color:#fff;box-shadow:0 0 14px var(--primary-glow)}



.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}

.stat-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:20px 24px;box-shadow:var(--shadow-card);transition:border-color .2s,transform .2s,box-shadow .2s,background .3s;cursor:default}

.stat-card:hover{border-color:var(--border-light);transform:translateY(-1px);box-shadow:var(--shadow-hover)}

.stat-label{font-size:12px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

.sparkline{display:block;width:100%;height:28px;margin-top:6px;opacity:.5;pointer-events:none}

.stat-value{font-variant-numeric:tabular-nums;font-family:'Fira Code',monospace;font-size:32px;font-weight:600;color:var(--text-primary);line-height:1.2}

.stat-sub{font-size:13px;color:var(--text-muted);margin-top:4px}

.stat-value.accent{color:var(--accent-gold)}

.stat-value.primary{color:var(--primary)}



.chart-section{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:24px;margin-bottom:28px;box-shadow:var(--shadow-card);transition:border-color .3s,background .3s,box-shadow .3s}

.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}

.chart-title{font-family:'Fira Code',monospace;font-size:15px;font-weight:600;color:var(--text-primary)}

.chart-period{font-size:12px;color:var(--text-muted);background:var(--bg-card);padding:5px 14px;border-radius:8px;border:1px solid var(--border-color);box-shadow:var(--shadow-card);font-family:'Fira Code',monospace;white-space:nowrap}

.date-filter{font-family:'Fira Sans',sans-serif;font-size:13px;color:var(--text-secondary);background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;padding:6px 12px;width:140px;cursor:pointer;transition:border-color .25s,box-shadow .25s;box-shadow:var(--shadow-card);color-scheme:light}

.date-filter:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}

[data-theme="dark"] .date-filter{color-scheme:dark}

.filter-reset{font-size:12px;color:var(--text-muted);background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;min-width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .25s,background .25s,color .25s,box-shadow .25s,transform .25s;padding:0;box-shadow:var(--shadow-card)}

.filter-reset.show{opacity:1}

.filter-reset:hover{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 12px var(--primary-glow);transform:scale(1.05)}

.filter-reset:focus-visible{outline:2px solid var(--primary);outline-offset:2px}



.search-input{font-family:'Fira Sans',sans-serif;font-size:13px;color:var(--text-secondary);background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;padding:7px 14px 7px 34px;width:320px;transition:border-color .25s,box-shadow .25s,width .25s;outline:none;box-shadow:var(--shadow-card)}

.search-input:focus{width:400px;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}

.search-input::placeholder{color:var(--text-muted);font-size:13px}

.search-wrap{position:relative;display:inline-flex;align-items:center}

.search-wrap .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5;pointer-events:none;color:var(--text-secondary)}

.tl-header-line{display:flex;align-items:center;gap:6px;flex-wrap:wrap}



.chart-view-opt.active-view{background:var(--primary);color:#fff!important}
.chart-view-opt:hover{color:var(--text-primary)}

/* Timeline Split Layout */

.tl-split{display:flex;gap:24px;min-height:0}

.tl-panel-left{flex:0 0 45%;overflow-y:auto;overscroll-behavior:contain;max-height:620px;padding-right:4px}

.tl-panel-right{flex:1;overflow-y:auto;overscroll-behavior:contain;max-height:620px;background:var(--diff-bg);border:1px solid var(--border-color);border-radius:8px;padding:16px;font-family:'Fira Code',monospace;font-size:12px;line-height:1.6;position:relative}

.diff-placeholder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-muted);font-family:'Fira Sans',sans-serif;font-size:13px;text-align:center;white-space:nowrap}



/* Footer */

.app-footer{display:flex;align-items:center;justify-content:space-between;padding:20px 0 8px;margin-top:16px;border-top:1px solid var(--border-color);transition:border-color .3s}

.footer-left,.footer-right{display:flex;align-items:center;gap:6px}

.footer-tag,.footer-version,.footer-license{font-size:12px;color:var(--text-muted)}

.footer-sep{color:var(--border-color);font-size:10px}

.footer-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);text-decoration:none;padding:4px 12px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-card);transition:color .2s,border-color .2s,box-shadow .2s;box-shadow:var(--shadow-card)}

.footer-link:hover{color:var(--primary);border-color:var(--primary);box-shadow:0 0 10px var(--primary-glow)}



/* Selected commit */

.timeline-item.selected{background:var(--primary-glow);border-radius:6px}

.timeline-item.selected .timeline-dot{background:var(--primary);box-shadow:0 0 8px var(--primary-glow)}



/* Diff viewer internal */

.diff-viewer .dv-header{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-color)}

.dv-hash{color:var(--primary);font-weight:600}

.dv-date{color:var(--text-muted);font-size:11px;margin-left:8px}

.dv-msg{color:var(--text-primary);font-size:12px;margin-top:4px}

.dv-files{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}

.dv-files .file-badge{font-size:10px}

.diff-separator{height:1px;background:var(--border-color);margin:16px 0}

.diff-file-section{margin-bottom:12px}

.diff-file-section .df-header{color:var(--primary);font-weight:500;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border-color);margin-bottom:6px}

.diff-line{display:flex;min-height:20px}

.diff-line .ln{color:var(--text-muted);text-align:right;padding-right:12px;width:36px;flex-shrink:0;user-select:none;font-size:10px}

.diff-line .code{flex:1;white-space:pre-wrap;word-break:break-all;padding-left:2px}

.diff-add{background:rgba(22,163,74,0.08)}

.diff-add .code{color:var(--success)}

.diff-del{background:rgba(220,38,38,0.06)}

.diff-del .code{color:var(--destructive)}

.diff-hdr{background:var(--tag-bg)}

.diff-hdr .code{color:var(--text-muted);font-style:italic}

.diff-nor{background:transparent}

.diff-nor .code{color:var(--text-secondary)}

.chart-wrapper{position:relative;width:100%;height:240px}

.chart-wrapper canvas{width:100%;height:100%;border-radius:4px}



.dashboard-bottom{display:grid;grid-template-columns:1fr 1fr;gap:28px}



.ranking-section{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:24px;box-shadow:var(--shadow-card)}

.ranking-title{font-family:'Fira Code',monospace;font-size:15px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px}

.ranking-title::after{content:'TOP 10';font-size:10px;font-weight:500;color:var(--accent-gold);background:var(--primary-glow);padding:2px 8px;border-radius:10px;letter-spacing:.5px}

.ranking-list{display:flex;flex-direction:column;gap:4px}

.ranking-item{display:flex;align-items:center;gap:12px;padding:6px 8px;border-radius:6px;transition:background .15s;cursor:default}

.ranking-item:hover{background:var(--bg-elevated)}

.ranking-pos{font-family:'Fira Code',monospace;font-size:12px;font-weight:600;width:24px;text-align:center;flex-shrink:0}

.ranking-pos.top1{color:var(--accent-gold)}

.ranking-pos.top2{color:var(--primary);opacity:.7}

.ranking-pos.top3{color:var(--text-secondary)}

.ranking-name{font-family:'Fira Code',monospace;font-size:12px;color:var(--text-secondary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.ranking-bar-wrap{flex:1;height:6px;background:var(--ranking-bar-bg);border-radius:3px;overflow:hidden;max-width:200px}

.ranking-bar{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}

.ranking-bar.top1{background:linear-gradient(90deg,var(--accent-gold),var(--primary))}

.ranking-bar.top2{background:var(--primary);opacity:.8}

.ranking-bar.top3{background:var(--primary);opacity:.55}

.ranking-bar.normal{background:var(--primary);opacity:.3}

.ranking-count{font-family:'Fira Code',monospace;font-size:12px;color:var(--text-muted);width:28px;text-align:right;flex-shrink:0}



.timeline-section{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:24px;box-shadow:var(--shadow-card)}

.timeline-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}

.timeline-title{font-family:'Fira Code',monospace;font-size:15px;font-weight:600}

.timeline-list{position:relative;padding-left:28px}

.timeline-list::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:1px;background:var(--border-color)}

.timeline-item{position:relative;padding:0 0 28px 20px}

.timeline-item:last-child{padding-bottom:0}

.timeline-dot{position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--bg-card);border:2px solid var(--primary);z-index:1;transition:background .2s,box-shadow .2s,border-color .2s}

.timeline-item:hover .timeline-dot{background:var(--primary);box-shadow:0 0 8px var(--primary-glow)}

.timeline-meta{display:flex;align-items:center;gap:12px;margin-bottom:4px}

.timeline-hash{font-family:'Fira Code',monospace;font-size:11px;color:var(--primary);opacity:.7;cursor:pointer}

.timeline-hash:hover{opacity:1}

.timeline-date{font-size:12px;color:var(--text-muted)}

.timeline-msg{font-family:'Fira Code',monospace;font-size:13px;color:var(--text-primary);margin-bottom:6px}

.timeline-files{display:flex;flex-wrap:wrap;gap:6px}

.file-badge{font-family:'Fira Code',monospace;font-size:11px;padding:2px 8px;border-radius:4px;background:var(--tag-bg);border:1px solid var(--tag-border);color:var(--text-secondary);display:flex;align-items:center;gap:4px}

.file-badge .status{font-weight:600}

.file-badge .status.M{color:var(--primary)}

.file-badge .status.A{color:var(--success)}

.file-badge .status.D{color:var(--destructive)}



/* .timeline-expand removed - diff is now in the right panel */



.timeline-loader{text-align:center;padding:24px;color:var(--text-muted);font-size:13px}

.timeline-loader .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border-color);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}

@keyframes spin{to{transform:rotate(360deg)}}



.page{display:none}

.page.active{display:block}



.chart-tooltip{position:absolute;background:var(--bg-card);border:1px solid var(--border-color);border-radius:6px;padding:8px 14px;font-family:'Fira Code',monospace;font-size:12px;color:var(--text-primary);pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;white-space:nowrap;box-shadow:var(--shadow-card);max-width:320px}

.chart-tooltip.visible{opacity:1}

.chart-tooltip .tt-date{color:var(--text-muted);font-size:11px}

.chart-tooltip .tt-val{color:var(--primary);font-weight:600}



@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.fade-up{animation:fadeUp .4s ease-out forwards}



@media(max-width:900px){

  .app-container{padding:16px}

  .stats-grid{grid-template-columns:repeat(2,1fr)}

  .dashboard-bottom{grid-template-columns:1fr}

  .header{flex-direction:column;gap:16px;align-items:flex-start}

}

@media(max-width:560px){

  .stats-grid{grid-template-columns:1fr}

  .header h1{font-size:17px}

  .tl-panel-left{flex:1}

  .tl-split{flex-direction:column}

  .tl-panel-right{max-height:400px}

  .tl-header-line{gap:4px!important;flex-wrap:wrap}

  .date-filter{width:120px}

  .search-input{width:100%}

  .search-input:focus{width:100%}

}

@media(max-width:480px){

  .date-filter{width:100px}

}

@media(prefers-reduced-motion:reduce){

  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}

  .ranking-bar{transition:none}

  .fade-up{animation:none;opacity:1}

}

@supports(padding:max(0px)){

  .app-container{padding-left:max(32px,env(safe-area-inset-left));padding-right:max(32px,env(safe-area-inset-right));padding-bottom:max(64px,env(safe-area-inset-bottom))}

  .header{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}

}

</style>

</head>

<body>



<div class="app-container">

  <header class="header">

    <div class="header-left">

      <div class="logo-icon">ac</div>

      <h1>Agentcfg <span>Dashboard</span></h1>

    </div>

    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">

      <div class="theme-toggle" id="themeToggle" role="button" tabindex="0" title="Toggle theme">

        <span class="toggle-opt active" data-theme="light" aria-label="Light mode"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>

        <span class="toggle-opt" data-theme="dark" aria-label="Dark mode"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>

      </div>

      <div class="lang-toggle" id="langToggle" role="button" tabindex="0" title="Switch language">

        <span class="toggle-opt active" data-lang="zh" aria-label="中文">中</span>

        <span class="toggle-opt" data-lang="en" aria-label="English">EN</span>

      </div>

      <nav class="nav-pills" role="tablist">

        <button class="nav-pill active" data-page="dashboard" role="tab">仪表板</button>

        <button class="nav-pill" data-page="timeline" role="tab">时间线</button>

      </nav>

    </div>

  </header>



  <!-- ===== Dashboard ===== -->

  <section class="page active" id="page-dashboard">

    <div class="stats-grid fade-up" id="statsGrid">

      <div class="stat-card"><div class="stat-label">总备份</div><div class="stat-value accent" id="statCommits">—</div><div class="stat-sub" id="statCommitsSub">commits</div><canvas class="sparkline" data-src="commits"></canvas></div>

      <div class="stat-card"><div class="stat-label">追踪文件</div><div class="stat-value primary" id="statFiles">—</div><div class="stat-sub" id="statFilesSub">files</div><canvas class="sparkline" data-src="files"></canvas></div>

      <div class="stat-card"><div class="stat-label">首次备份</div><div class="stat-value" id="statFirst">—</div><div class="stat-sub" id="statFirstSub">—</div><canvas class="sparkline" data-src="commits"></canvas></div>

      <div class="stat-card"><div class="stat-label">最近备份</div><div class="stat-value" id="statLast">—</div><div class="stat-sub" id="statLastSub">—</div><canvas class="sparkline" data-src="commits"></canvas></div>

    </div>



    <div class="chart-section fade-up">

      <div class="chart-header">

        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">

          <span class="chart-title">备份活跃度走势</span>
          <div style="display:flex;align-items:center;gap:6px;background:var(--tag-bg);border:1px solid var(--border-color);border-radius:6px;padding:2px;font-size:11px;">
            <span class="chart-view-opt active-view" id="chartViewMode" data-mode="weekly" style="padding:2px 8px;border-radius:4px;cursor:pointer;color:var(--text-secondary);transition:color .2s,background .2s">周</span>
            <span class="chart-view-opt" data-mode="daily" style="padding:2px 8px;border-radius:4px;cursor:pointer;color:var(--text-muted);transition:color .2s,background .2s">日</span>
          </div>

          <div class="chart-legend" style="display:flex;gap:12px;">

            <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary);">

              <span style="width:14px;height:2px;background:var(--primary);border-radius:1px;"></span> 日提交

            </span>

            <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary);">


            <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary);">

              <span style="width:14px;height:2px;background:#22C55E;border-radius:1px;"></span> 3日MA

            </span>

          </div>

        </div>

        <div class="tl-header-line" style="gap:8px">

          <span class="chart-period" id="filterLabel">2026-07-09 → 07-23</span>

          <input type="date" id="filterStart" class="date-filter" value="2026-07-09" title="开始日期">

          <span style="color:var(--text-muted);font-size:14px;font-weight:300;">—</span>

          <input type="date" id="filterEnd" class="date-filter" value="2026-07-23" title="结束日期">

          <button id="filterReset" class="filter-reset" title="返回" aria-label="返回全部范围">返回</button>

        </div>

      </div>

      <div class="chart-wrapper" id="trendChart">

        <canvas id="areaCanvas"></canvas>

        <div class="chart-tooltip" id="chartTooltip"><div class="tt-date"></div><div class="tt-val"></div></div>

      </div>

    </div>



    <div class="dashboard-bottom fade-up">

      <div class="ranking-section">

        <div class="ranking-title">高频文件</div>

        <div class="ranking-list" id="rankingList"></div>

      </div>

      <div class="timeline-section" style="cursor:pointer" onclick="switchPage('timeline')">

        <div class="timeline-header">

          <span class="timeline-title">最近变更</span>

          <span style="font-size:12px;color:var(--primary)">查看全部 →</span>

        </div>

        <div class="timeline-list" id="recentPreview"></div>

      </div>

    </div>

<script>

// ============================================================

// Theme

// ============================================================

const i18n = {

  zh: {

    dashboard: '仪表板', timeline: '时间线',

    statCommits: '总备份', statCommitsSub: 'commits',

    statFiles: '追踪文件', statFilesSub: 'tracked',

    rankTitle: '高频文件',

    tlTitle: '版本历史',

    searchPlaceholder: '搜索 commit 消息、文件名或 hash…',

    viewAll: '查看全部',

    noDiff: '该 commit 无 diff 数据',

    loadMore: '加载更多…', noData: '所选范围无数据',

    tlTitle: 'History',

    searchPlaceholder: 'Search commit msg, file or hash…',

    tlCount: 'commits',

    viewAll: 'View all',

    diffPlaceholder: 'Select a commit to view diff',

    noDiff: 'No diff data for this commit',

    loadMore: 'Load more…', noData: 'No data in selected range',

    footerTag: 'AI Config Version Control',

  }

};

let currentLang = 'zh';



function applyLang(lang) {

  currentLang = lang;

  const t = i18n[lang];

  document.querySelectorAll('.nav-pill')[0].textContent = t.dashboard;

  document.querySelectorAll('.nav-pill')[1].textContent = t.timeline;

  document.getElementById('statCommits').closest('.stat-card').querySelector('.stat-label').textContent = t.statCommits;

  document.getElementById('statFiles').closest('.stat-card').querySelector('.stat-label').textContent = t.statFiles;

  document.getElementById('statLast').closest('.stat-card').querySelector('.stat-label').textContent = t.statLast;

  document.querySelector('.ranking-title').textContent = t.rankTitle;

  document.querySelector('.tl-section-title').textContent = t.tlTitle;

  document.getElementById('tlSearch').placeholder = t.searchPlaceholder;

  document.querySelector('.diff-placeholder').textContent = t.diffPlaceholder;

function setTheme(t) {

  document.documentElement.setAttribute('data-theme', t);

  document.querySelectorAll('#themeToggle .toggle-opt').forEach(e => e.classList.toggle('active', e.dataset.theme === t));

  if (document.getElementById('page-dashboard').classList.contains('active')) {

    setTimeout(drawChart, 50);

    setTimeout(drawSparklines, 100);

}

document.getElementById('themeToggle').addEventListener('click', function(e) {

  const t = e.target.closest('.toggle-opt'); if (!t) return;

  setTheme(t.dataset.theme);

});

document.getElementById('langToggle').addEventListener('click', function(e) {

  const t = e.target.closest('.toggle-opt'); if (!t) return;

  document.querySelectorAll('#langToggle .toggle-opt').forEach(o => o.classList.toggle('active', o === t));

setTheme('light');

applyLang('zh');



// ============================================================

// Data: 由 agentcfg ui server 端点填充 (loadStats / loadLog / loadDiff)

// ============================================================

let dailyActivity = [];

let allCommits = [];

const diffsCache = {};   // 按需 fetch /api/diff?hash=... 缓存

let statsLoaded = false;

let logLoaded = false;

let logExhausted = false;  // 标记已加载到末尾,避免无限重试

// 全局 filter state

let filterStart = '';

let filterEnd = '';

let tlFilterStart = '';

let tlFilterEnd = '';

let tlSearchTerm = '';

// ---- API helpers ----

async function apiStats() {
  const r = await fetch('/api/stats');
  if (!r.ok) throw new Error('stats ' + r.status);
  return r.json();
}

async function apiLog(skip, limit) {
  const r = await fetch(`/api/log?skip=${skip}&limit=${limit}`);
  if (!r.ok) throw new Error('log ' + r.status);
  return r.json();
}

async function apiDiff(hash) {
  const r = await fetch(`/api/diff?hash=${encodeURIComponent(hash)}`);
  if (!r.ok) throw new Error('diff ' + r.status);
  return r.json();
}

async function loadStats() {
  try {
    const data = await apiStats();
    dailyActivity = data.dailyActivity || [];
    fileRanking = data.fileRanking || [];
    statsLoaded = true;
    if (typeof applyFilter === 'function') applyFilter();
    else if (typeof drawChart === 'function') drawChart();
    if (typeof drawSparklines === 'function') drawSparklines();
    if (typeof renderRanking === 'function') renderRanking();
    if (typeof renderRecentPreview === 'function') renderRecentPreview();
  } catch (err) {
    console.error('loadStats failed:', err);
    showApiError('加载统计失败: ' + err.message);
  }
}

async function loadLogChunk() {
  if (tlLoading || logExhausted) return;
  const skip = allCommits.length;
  const limit = 20;
  tlLoading = true;
  try {
    const data = await apiLog(skip, limit);
    const batch = data.commits || [];
    allCommits.push(...batch);
    if (typeof renderTimeline === 'function') renderTimeline(batch, 'timelineList', true);
    if (batch.length < limit) logExhausted = true;
    logLoaded = true;
  } catch (err) {
    console.error('loadLog failed:', err);
    showApiError('加载 commit 列表失败: ' + err.message);
  } finally {
    tlLoading = false;
    const loader = document.getElementById('timelineLoader');
    if (loader) {
      if (logExhausted) loader.innerHTML = `— 共 ${allCommits.length} 条 commit —`;
      else loader.style.display = 'block';
    }
    const cnt = document.getElementById('tlCount');
    if (cnt) cnt.textContent = `${allCommits.length} commits`;
  }
}

async function loadDiff(hash) {
  if (diffsCache[hash]) return diffsCache[hash];
  try {
    const data = await apiDiff(hash);
    diffsCache[hash] = data.files || [];
    return diffsCache[hash];
  } catch (err) {
    console.error('loadDiff failed:', err);
    showApiError('加载 diff 失败: ' + err.message);
    return [];
  }
}

function showApiError(msg) {
  const loader = document.getElementById('timelineLoader');
  if (loader) loader.innerHTML = `<span style="color:var(--destructive)">⚠ ${msg}</span>`;
}




// Global filter state (declared at top: 832-840)



function getFilteredData() {

  if (!filterStart && !filterEnd) return dailyActivity;

  let data = dailyActivity;

  if (filterStart) data = data.filter(d => d.fullDate >= filterStart);

  if (filterEnd) data = data.filter(d => d.fullDate <= filterEnd);

  return data;

}



function getFilteredCommits() {

  let data = allCommits;

  if (tlFilterStart) data = data.filter(c => c.date.slice(0,10) >= tlFilterStart);

  if (tlFilterEnd) data = data.filter(c => c.date.slice(0,10) <= tlFilterEnd);

  if (tlSearchTerm) {

    const q = tlSearchTerm.toLowerCase();

    data = data.filter(c => {

      if (c.message.toLowerCase().includes(q)) return true;

      if (c.hash.toLowerCase().includes(q)) return true;

      if (c.files.some(f => f.n.toLowerCase().includes(q))) return true;

      return false;

    });

  }

  return data;

}



const fileRanking = [];  // 由 loadStats() 填充




function renderDiffLines(lines, startLine) {

  let html = '';

  let lnum = startLine || 1;

  for (const l of lines) {

    const cls = l.type === 'a' ? 'diff-add' : l.type === 'd' ? 'diff-del' : l.type === 'h' ? 'diff-hdr' : 'diff-nor';

    const prefix = l.type === 'a' ? '+' : l.type === 'd' ? '-' : ' ';

    if (l.type === 'h') {

      html += `<div class="diff-line diff-hdr"><span class="ln"><a href="#L${lnum}">${lnum}</a></span><span class="code">${l.line}</span></div>`;

      lnum++;

    } else {

      const code = highlightJS(l.line);

      html += `<div class="diff-line ${cls}"><span class="ln"><a href="#L${lnum}">${lnum}</a></span><span class="code">${prefix}${code}</span></div>`;

      lnum++;

    }

  }

  return html;

}



function escapeHtml(s) {

  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

}



function highlightJS(line) {

  let s = escapeHtml(line);

  // Comments

  s = s.replace(/(\/\/.*)/g, '<span style="color:#6b7280;font-style:italic">$1</span>');

  // Strings (double, single, backtick)

  s = s.replace(/(&quot;[^&quot;]*&quot;)/g, '<span style="color:#059669">$1</span>');

  s = s.replace(/('[^']*')/g, '<span style="color:#059669">$1</span>');

  // JS keywords

  const kw = 'const|let|var|function|return|if|else|for|while|import|export|from|require|async|await|class|new|this|module|true|false|null|undefined|throw|try|catch'.split('|');

  kw.forEach(k => { s = s.replace(new RegExp('\\b' + k + '\\b', 'g'), '<span style="color:#7c3aed;font-weight:500">$&</span>'); });

  // Numbers

  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#2563eb">$1</span>');

  return s;

}



// ============================================================

// Build Commits (由 loadLogChunk() 异步填充)

// ============================================================

// allCommits 在顶部已声明为 [],每条 {hash, date, message, files:[{n,s,i,d}]} 由后端 /api/log 提供

// diffsCache 在顶部已声明为 {},由 selectCommit -> loadDiff() 按需填充



// ============================================================

// Page Switch

// ============================================================

function switchPage(page) {

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));

  document.getElementById('page-'+page).classList.add('active');

  document.querySelector(`.nav-pill[data-page="${page}"]`).classList.add('active');

  if (page === 'dashboard') setTimeout(drawChart, 50);

}

document.querySelectorAll('.nav-pill').forEach(b => b.addEventListener('click', () => switchPage(b.dataset.page)));



// ============================================================

// Chart

// ============================================================

function drawChart() {

  const canvas = document.getElementById('areaCanvas');

  const wrapper = document.getElementById('trendChart');

  const tooltip = document.getElementById('chartTooltip');

  const rect = wrapper.getBoundingClientRect();

  const dpr = window.devicePixelRatio || 1;

  const w = rect.width, h = 240;

  canvas.width = w * dpr; canvas.height = h * dpr;

  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');

  ctx.scale(dpr, dpr);



  const viewMode = document.getElementById('chartViewMode')?.dataset?.mode || 'weekly';

  // Aggregate data into weeks if weekly mode and no date filter active
  let chartData = getFilteredData();
  if (viewMode === 'weekly' && !filterStart && !filterEnd) {
    const weeks = {};
    chartData.forEach(d => {
      const date = new Date(d.fullDate);
      const mon = date.getDate() - date.getDay() + 1; // Monday
      const wkStart = new Date(date);
      wkStart.setDate(mon);
      const key = wkStart.toISOString().slice(0, 10);
      if (!weeks[key]) weeks[key] = { date: key.slice(5), fullDate: key, commits: 0, filesChanged: 0 };
      weeks[key].commits += d.commits;
      weeks[key].filesChanged += d.filesChanged;
    });
    chartData = Object.values(weeks).sort((a, b) => a.fullDate.localeCompare(b.fullDate));
  }
  const rawData = chartData;

  // shallow copy so we don't pollute original with .cum

  const data = rawData.map(d => ({...d}));

  if (data.length === 0) {

    // Empty state

    ctx.clearRect(0,0,w,h);

    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim() || '#a8a29e';

    ctx.font = '14px Fira Sans, sans-serif';

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.fillText('所选范围无数据', w/2, h/2);

    return;

  }

  // compute cumulative

  let cum = 0;

  data.forEach((d,i,a) => { cum += d.commits; d.cum = cum;

    const slice = a.slice(Math.max(0,i-2), i+1);

    d.ma = +(slice.reduce((s,x) => s + x.commits, 0) / slice.length).toFixed(1);

  });



  const pad = { top:24, right:48, bottom:32, left:40 };

  const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;

  const maxDaily = Math.max(...data.map(d=>d.commits));

  const maxCum = data[data.length-1].cum;

  const xp = i => pad.left + (i/(data.length-1))*cw;

  const ypD = v => pad.top + ch - (v / maxDaily) * ch;

  const ypC = v => pad.top + ch - (v / maxCum) * ch;

  const pts = data.map((d,i)=>({x:xp(i),y:ypD(d.commits),cy:ypC(d.cum),...d}));



  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  const primColor = isDark ? '#F97316' : '#ea580c';

  const accentColor = isDark ? '#FBBF24' : '#b45309';

  const cumColor = isDark ? '#38BDF8' : '#2563EB';

  const borderColor = isDark ? '#2a1a1a' : '#e8e0d8';

  const mutedColor = isDark ? '#6b5050' : '#a8a29e';

  const crosshairColor = isDark ? '#3a2828' : '#d6cdc4';

  const gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';



  function draw(hoverIdx) {

    ctx.clearRect(0,0,w,h);



    // ---- Subtle horizontal grid lines ----

    ctx.strokeStyle = gridColor;

    ctx.lineWidth = 1;

    for (let i = 0; i <= 5; i++) {

      const y = pad.top + (i / 5) * ch;

      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();

    }



    // ---- Daily columns (thin bars for "真实感") ----

    const barW = Math.max(4, (cw / data.length) * 0.5);

    for (let i = 0; i < pts.length; i++) {

      const pt = pts[i];

      const barH = ch - (pt.y - pad.top);

      const col = isDark ? 'rgba(249,115,22,0.06)' : 'rgba(234,88,12,0.07)';

      ctx.fillStyle = col;

      ctx.fillRect(pt.x - barW/2, pt.y, barW, barH);

    }



    // ---- Baseline ----

    ctx.strokeStyle = borderColor; ctx.lineWidth = 1;

    ctx.beginPath(); ctx.moveTo(pad.left, pad.top + ch); ctx.lineTo(w - pad.right, pad.top + ch); ctx.stroke();



    // ---- Daily area gradient ----

    const dailyGrad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);

    dailyGrad.addColorStop(0, isDark ? 'rgba(249,115,22,0.22)' : 'rgba(234,88,12,0.2)');

    dailyGrad.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.beginPath();

    ctx.moveTo(pts[0].x, pad.top + ch);

    for (let i = 0; i < pts.length; i++) {

      if (i === 0) ctx.lineTo(pts[i].x, pts[i].y);

      else { const p = pts[i-1]; ctx.bezierCurveTo(p.x+(pts[i].x-p.x)/2, p.y, p.x+(pts[i].x-p.x)/2, pts[i].y, pts[i].x, pts[i].y); }

    }

    ctx.lineTo(pts[pts.length-1].x, pad.top + ch); ctx.closePath();

    ctx.fillStyle = dailyGrad; ctx.fill();



    // ---- Daily area line (bezier smooth) ----

    ctx.beginPath();

    for (let i = 0; i < pts.length; i++) {

      if (i === 0) ctx.moveTo(pts[i].x, pts[i].y);

      else { const p = pts[i-1]; ctx.bezierCurveTo(p.x+(pts[i].x-p.x)/2, p.y, p.x+(pts[i].x-p.x)/2, pts[i].y, pts[i].x, pts[i].y); }

    }

    ctx.strokeStyle = primColor; ctx.lineWidth = 2; ctx.stroke();



        // ---- Moving average line (green, 3-day SMA) ----

    const maColor = isDark ? '#22C55E' : '#16a34a';

    ctx.beginPath();

    for (let i = 0; i < pts.length; i++) {

      const y = ypD(pts[i].ma);

      if (i === 0) ctx.moveTo(pts[i].x, y);

      else { const p = pts[i-1]; ctx.bezierCurveTo(p.x+(pts[i].x-p.x)/2, ypD(p.ma), p.x+(pts[i].x-p.x)/2, ypD(pts[i].ma), pts[i].x, y); }

    }

    ctx.strokeStyle = maColor; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);

    for (let i = 0; i < pts.length; i++) {

      ctx.beginPath(); ctx.arc(pts[i].x, ypD(pts[i].ma), 2, 0, Math.PI * 2);

      ctx.fillStyle = maColor; ctx.fill();

    }



    // ---- Y-axis left (daily) ----

    ctx.fillStyle = mutedColor; ctx.font = '10px Fira Code, monospace';

    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';

    for (let i = 0; i <= 4; i++) {

      const v = Math.round(maxDaily * i / 4);

      const y = pad.top + ch - (i / 4) * ch;

      if (i > 0) ctx.fillText(v, pad.left - 6, y);

    }



    // ---- Y-axis right (cumulative) ----

    ctx.textAlign = 'left';

    for (let i = 0; i <= 4; i++) {

      const v = Math.round(maxCum * i / 4);

      const y = pad.top + ch - (i / 4) * ch;

      if (i > 0) ctx.fillText(v, w - pad.right + 6, y);

    }



    // ---- Axis legend labels ----

    ctx.font = '9px Fira Sans, sans-serif';

    ctx.fillStyle = mutedColor; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';

    ctx.fillText('提交量', pad.left - 6, pad.top - 2);

    ctx.textAlign = 'left';

    // ctx.fillText('累计', w - pad.right + 6, pad.top - 2);



    // ---- X-axis date labels ----

    ctx.textAlign = 'center'; ctx.textBaseline = 'top';

    [0, Math.floor(data.length/2), data.length-1].forEach(i => ctx.fillText(data[i].date, pts[i].x, pad.top + ch + 8));



    // ---- Hover overlay ----

    if (hoverIdx >= 0 && hoverIdx < pts.length) {

      const pt = pts[hoverIdx];

      // Crosshair

      ctx.strokeStyle = crosshairColor; ctx.lineWidth = 1; ctx.setLineDash([3,3]);

      ctx.beginPath(); ctx.moveTo(pt.x, pad.top); ctx.lineTo(pt.x, pad.top + ch); ctx.stroke(); ctx.setLineDash([]);



      // Daily glow dot

      const dGlow = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, 14);

      dGlow.addColorStop(0, isDark ? 'rgba(249,115,22,0.6)' : 'rgba(234,88,12,0.5)');

      dGlow.addColorStop(1, 'rgba(0,0,0,0)');

      ctx.beginPath(); ctx.arc(pt.x, pt.y, 14, 0, Math.PI * 2); ctx.fillStyle = dGlow; ctx.fill();

      ctx.beginPath(); ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();

      ctx.strokeStyle = primColor; ctx.lineWidth = 2; ctx.stroke();



      // Cumulative dot highlight

      ctx.beginPath(); ctx.arc(pt.x, pt.cy, 4, 0, Math.PI * 2);

      ctx.fillStyle = cumColor; ctx.fill();

      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();

    }

  }

  draw(-1);



  let hoverI = -1;

  let dragStart = null, isDragging = false;



  canvas.onmousemove = function(e) {

    const r = canvas.getBoundingClientRect(), mx = e.clientX - r.left;



    // If dragging, draw selection overlay

    if (dragStart !== null) {

      const dist = Math.abs(mx - dragStart);

      if (dist > 10) isDragging = true;

      if (isDragging) {

        const x1 = Math.min(dragStart, mx);

        const x2 = Math.max(dragStart, mx);

        draw(hoverI);

        ctx.fillStyle = isDark ? 'rgba(249,115,22,0.08)' : 'rgba(234,88,12,0.06)';

        ctx.fillRect(x1, pad.top, x2 - x1, ch);

        ctx.strokeStyle = primColor; ctx.lineWidth = 1; ctx.setLineDash([4,2]);

        ctx.strokeRect(x1, pad.top, x2 - x1, ch);

        ctx.setLineDash([]);

        return;

      }

    }



    // Hover crosshair (only when not dragging)

    let ci = 0, md = Infinity;

    for (let i = 0; i < pts.length; i++) { const d = Math.abs(pts[i].x - mx); if (d < md) { md = d; ci = i; } }

    if (ci !== hoverI) {

      hoverI = ci; draw(ci);

      const pt = pts[ci];

      tooltip.querySelector('.tt-date').textContent = pt.date;

      tooltip.querySelector('.tt-val').innerHTML = `<span style="color:${primColor}">● ${pt.commits} commits</span> · <span style="color:#22C55E">● MA ${pt.ma}</span> · ${pt.filesChanged} 文件`;

      tooltip.classList.add('visible');

      let tx = pt.x + 16, ty = pt.y - 30;

      if (tx + 200 > w) tx = pt.x - 200;

      if (ty < 0) ty = pt.y + 20;

      tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';

    }

  };

  canvas.onmouseleave = function() { hoverI = -1; draw(-1); tooltip.classList.remove('visible'); };



  canvas.onmousedown = function(e) {

    const r = canvas.getBoundingClientRect();

    dragStart = e.clientX - r.left;

    isDragging = false;

  };



  canvas.onmouseup = function(e) {

    if (dragStart === null) return;

    if (isDragging) {

      const r = canvas.getBoundingClientRect();

      const mx = e.clientX - r.left;

      const x1 = Math.min(dragStart, mx);

      const x2 = Math.max(dragStart, mx);

      let i1 = 0, i2 = pts.length - 1, minD = Infinity;

      pts.forEach((p,i) => { const d = Math.abs(p.x - x1); if (d < minD) { minD = d; i1 = i; } });

      minD = Infinity;

      pts.forEach((p,i) => { const d = Math.abs(p.x - x2); if (d < minD) { minD = d; i2 = i; } });

      if (i1 < i2) {

        const s = document.getElementById('filterStart');

        const e = document.getElementById('filterEnd');

        if (s) s.value = pts[Math.max(0,i1)].fullDate;

        if (e) e.value = pts[Math.min(pts.length-1,i2)].fullDate;

        applyFilter();

      }

    }

    dragStart = null; isDragging = false;

  };



  // Double-click to reset zoom

  canvas.ondblclick = function() {

    const s = document.getElementById('filterStart');

    const e = document.getElementById('filterEnd');

    const r = document.getElementById('filterReset');

    if (r && r.classList.contains('show')) r.click();

  };

}

// Static full-range totals (mock data)

const ALL_FILES_UNIQUE = 156;



function sumCommits(data) { return data.reduce((s,d) => s + d.commits, 0); }

function sumFiles(data) { return data.reduce((s,d) => s + d.filesChanged, 0); }



function updateStats(filteredData) {

  const data = filteredData || dailyActivity;

  const inRange = data.length < dailyActivity.length;

  const commits = sumCommits(data);

  const files = sumFiles(data);

  const totalC = sumCommits(dailyActivity);

  const first = data[0];

  const last = data[data.length - 1];



  document.getElementById('statCommits').textContent = commits;

  document.getElementById('statCommitsSub').textContent = inRange ? `${commits} / ${totalC} commits` : 'commits';

  document.getElementById('statFiles').textContent = files;

  document.getElementById('statFilesSub').textContent = inRange ? `${files} files / ${ALL_FILES_UNIQUE} tracked` : `${ALL_FILES_UNIQUE} tracked`;

  document.getElementById('statFirst').textContent = first ? first.date : '—';

  document.getElementById('statFirstSub').textContent = first ? first.fullDate : '—';

  document.getElementById('statLast').textContent = last ? last.date : '—';

  document.getElementById('statLastSub').textContent = last ? last.fullDate : '—';

}



function drawSparklines() {

  document.querySelectorAll('.sparkline').forEach(canvas => {

    const src = canvas.dataset.src;

    const parent = canvas.parentElement;

    const w = parent.offsetWidth - 48 || 160;

    const dpr = window.devicePixelRatio || 1;

    canvas.width = w * dpr; canvas.height = 28 * dpr;

    canvas.style.width = w + 'px'; canvas.style.height = '28px';

    const ctx = canvas.getContext('2d');

    ctx.scale(dpr, dpr);



    const data = src === 'files' ? dailyActivity.map(d => d.filesChanged) : dailyActivity.map(d => d.commits);

    if (data.length < 2) return;

    const max = Math.max(...data);

    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

    const color = isDark ? '#F97316' : '#ea580c';

    const pad = 2;

    const cw = w - pad * 2, ch = 24;



    // Area fill

    const grad = ctx.createLinearGradient(0, 0, 0, ch);

    const alpha = isDark ? 'rgba(249,115,22,0.25)' : 'rgba(234,88,12,0.2)'; grad.addColorStop(0, alpha);

    grad.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.beginPath(); ctx.moveTo(pad, ch);

    data.forEach((v, i) => { const x = pad + (i / (data.length - 1)) * cw; const y = ch - (v / max) * ch; if (i === 0) ctx.lineTo(x, y); else ctx.lineTo(x, y); });

    ctx.lineTo(pad + cw, ch); ctx.closePath(); ctx.fillStyle = grad; ctx.fill();



    // Line

    ctx.beginPath();

    data.forEach((v, i) => { const x = pad + (i / (data.length - 1)) * cw; const y = ch - (v / max) * ch; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); });

    ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.stroke();

  });

}



function applyFilter() {

  const s = document.getElementById('filterStart').value;

  const e = document.getElementById('filterEnd').value;

  const minDate = dailyActivity[0].fullDate;

  const maxDate = dailyActivity[dailyActivity.length-1].fullDate;

  const isFullRange = (!s && !e) || (s === minDate && e === maxDate);



  filterStart = isFullRange ? '' : s;

  filterEnd = isFullRange ? '' : e;



  const resetBtn = document.getElementById('filterReset');

  if (filterStart || filterEnd) resetBtn.classList.add('show'); else resetBtn.classList.remove('show');



  const filtered = getFilteredData();

  const label = document.getElementById('filterLabel');

  if (filtered.length === dailyActivity.length) {

    label.textContent = `${minDate} → ${maxDate}`;

  } else if (filtered.length > 0) {

    label.textContent = `${filtered[0].fullDate} → ${filtered[filtered.length-1].date} (${filtered.length}d)`;

  } else {

    label.textContent = '所选范围无数据';

  }



  updateStats(filtered);

  drawChart();

}

function renderTimeline(items, containerId, append) {

  const c = document.getElementById(containerId);

  if (!append) c.innerHTML = '';



  items.forEach((cm, idx) => {

    const el = document.createElement('div');

    el.className = 'timeline-item fade-up';

    el.dataset.hash = cm.hash;

    el.style.animationDelay = (idx * 20) + 'ms';



    const fh = cm.files.map(f =>

      `<span class="file-badge"><span class="status ${f.s}">${f.s}</span> ${f.n}</span>`

    ).join('');



    el.innerHTML = `

      <div class="timeline-dot"></div>

      <div class="timeline-meta"><span class="timeline-hash" translate="no">${cm.hash}</span><span class="timeline-date">${cm.date}</span></div>

      <div class="timeline-msg">${cm.message}</div>

      <div class="timeline-files">${fh}</div>

    `;

    c.appendChild(el);



    // Click to select commit and show diff in right panel

    el.addEventListener('click', function(e) {

      selectCommit(cm.hash, e);

    });

  });

}



let selectedHash = null;



let compareHash = null;



function selectCommit(hash, e) {

  const isCtrl = e && (e.ctrlKey || e.metaKey);



  if (isCtrl && selectedHash && selectedHash !== hash) {

    // Ctrl+click: compare two commits

    compareHash = hash;

    document.querySelectorAll('#timelineList .timeline-item').forEach(el => {

      el.classList.toggle('selected', el.dataset.hash === hash || el.dataset.hash === selectedHash);

    });

    const cm1 = allCommits.find(c => c.hash === selectedHash);

    const cm2 = allCommits.find(c => c.hash === hash);

    if (cm1 && cm2) renderCompareView(cm1, cm2);

    return;

  }



  // Normal click: single commit select

  compareHash = null;

  selectedHash = hash;

  document.querySelectorAll('#timelineList .timeline-item').forEach(el => {

    el.classList.toggle('selected', el.dataset.hash === hash);

  });

  const cm = allCommits.find(c => c.hash === hash);

  if (!cm) return;

  const panel = document.getElementById('diffViewer');

  panel.innerHTML = '<div class="diff-placeholder"><span class="spinner"></span> 加载 diff…</div>';

  loadDiff(hash).then(fileDiffs => {

    if (selectedHash !== hash) return;  // 用户已切换到别的 commit

    renderDiffView(cm, fileDiffs);

  });

}



function renderDiffView(cm, fileDiffs) {

  const panel = document.getElementById('diffViewer');

  if (!fileDiffs || fileDiffs.length === 0) {

    panel.innerHTML = `<div class="diff-placeholder">该 commit 无 diff 数据</div>`;

    return;

  }



  const fh = cm.files.map(f =>

    `<span class="file-badge"><span class="status ${f.s}">${f.s}</span> ${f.n}</span>`

  ).join('');



  let filesHtml = '';

  fileDiffs.forEach(fd => {

    const header = `diff --git a/${fd.name} b/${fd.name}`;

    const hdrLine = `@@ -1,${fd.lines.length} +1,${fd.lines.length} @@`;

    filesHtml += `<div class="diff-file-section">`;

    filesHtml += `<div class="df-header">${escapeHtml(fd.name)}  (${fd.status})</div>`;

    filesHtml += `<div class="diff-line diff-hdr"><span class="ln"></span><span class="code">${escapeHtml(header)}</span></div>`;

    filesHtml += `<div class="diff-line diff-hdr"><span class="ln"></span><span class="code">${escapeHtml(hdrLine)}</span></div>`;

    filesHtml += renderDiffLines(fd.lines, fd.startLine);

    filesHtml += `</div>`;

  });



  panel.innerHTML = `

    <div class="diff-viewer">

      <div class="dv-header">

        <span class="dv-hash">${cm.hash}</span>

        <span class="dv-date">${cm.date}</span>

        <div class="dv-msg">${cm.message}</div>

        <div class="dv-files">${fh}</div>

      </div>

      ${filesHtml}

    </div>

  `;

  panel.scrollTop = 0;

}

function renderCompareView(cm1, cm2) {

  const panel = document.getElementById('diffViewer');

  Promise.all([loadDiff(cm1.hash), loadDiff(cm2.hash)]).then(([d1, d2]) => {

function renderCompareViewReal(cm1, d1, cm2, d2) {

  const fh2 = cm2.files.map(f => `<span class="file-badge"><span class="status ${f.s}">${f.s}</span> ${f.n}</span>`).join('');

        <div class="dv-hash" style="font-size:11px;">${cm2.hash}</div>

        <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">${cm2.date}</div>

      <table style="width:100%;font-size:11px;border-collapse:collapse;">

  // Build a file comparison table

  const allFiles = [...new Set([...cm1.files.map(f=>f.n), ...cm2.files.map(f=>f.n)])];

// Keyboard shortcuts

document.addEventListener('keydown', function(e) {

  const tag = document.activeElement?.tagName || '';

  const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';



  // Ctrl+K / Cmd+K: focus search, switch to timeline

  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {

    e.preventDefault();

    const search = document.getElementById('tlSearch');

    if (search) { switchPage('timeline'); search.focus(); }

    return;

  }



  // Arrow keys switch pages (only when not typing)

  if (!isInput && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {

    const pages = ['dashboard', 'timeline'];

    const cur = document.querySelector('.page.active')?.id?.replace('page-', '') || 'dashboard';

    const idx = pages.indexOf(cur);

    const next = e.key === 'ArrowRight' ? pages[Math.min(idx + 1, pages.length - 1)] : pages[Math.max(idx - 1, 0)];

    if (next !== cur) { e.preventDefault(); switchPage(next); }

    return;

  }



  // Esc: blur input / clear search

  if (e.key === 'Escape' && isInput) {

    document.activeElement?.blur();

    return;

  }



  // R: reset filters (when not typing)

  if (!isInput && (e.key === 'r' || e.key === 'R')) {

    const r1 = document.getElementById('filterReset');

    const r2 = document.getElementById('tlFilterReset');

    if (r1?.classList.contains('show')) r1.click();

    if (r2?.classList.contains('show')) r2.click();

  }

});



const obs = new IntersectionObserver(entries => {

  entries.forEach(e => {

    if (e.isIntersecting && document.getElementById('page-timeline').classList.contains('active'))

});

obs.observe(document.getElementById('timelineLoader'));

});



const ptlObs = new MutationObserver(() => {

  if (document.getElementById('page-timeline').classList.contains('active')) loadMoreTimeline();

});

ptlObs.observe(document.getElementById('page-timeline'), { attributes: true, attributeFilter: ['class'] });
